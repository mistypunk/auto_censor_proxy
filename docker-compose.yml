version: '3.8'

services:
  nudenet-service:
    build:
      context: ./model
    container_name: nudenet-service
    restart: unless-stopped

  censor-proxy:
    build:
      context: .
      dockerfile: Dockerfile.censor-proxy
    container_name: censor-proxy
    ports:
      - "3000:3000"
    depends_on:
      - nudenet-service
    restart: unless-stopped

  mitm-proxy:
    build:
      context: .
      dockerfile: Dockerfile.mitm-proxy
    container_name: mitm-proxy
    ports:
      - "8082:8082"
    depends_on:
      - censor-proxy
    restart: unless-stopped
    volumes:
      - mitmproxy-certs:/home/mitmproxy/.mitmproxy

volumes:
  mitmproxy-certs:
